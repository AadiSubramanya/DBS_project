<!DOCTYPE html>
<html>
<head>
    <title>MCQ Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="glass-panel" style="display: flex; justify-content: space-between; padding: 1rem;">
        <h2>Online MCQ Portal</h2>
        <div>
            {% if session.get('user_id') %}
                <a href="/dashboard" class="btn">Dashboard</a>
                <a href="/logout" class="btn" style="background: red;">Logout</a>
            {% else %}
                <a href="/login" class="btn">Login</a>
                <a href="/register" class="btn">Register</a>
            {% endif %}
        </div>
    </nav>
    <div>
        {% for message in get_flashed_messages() %} <div style="color: yellow; margin-bottom: 1rem;">{{ message }}</div> {% endfor %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
