{% extends "base.html" %} 

{% block content %}
<div class="glass-panel" style="max-width: 500px; margin: auto;">
    <h2>Register an Account</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Create a new profile on the system.</p>
    
    <form method="POST" action="/register">
        <label>Full Name</label>
        <input type="text" name="full_name" required placeholder="John Doe">
        
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="johndoe@university.edu">
        
        <label>Username</label>
        <input type="text" name="username" required placeholder="johndoe123">
        
        <label>Password</label>
        <input type="password" name="password" required placeholder="Create a password">
        
        <label>Account Type</label>
        <select name="role" required style="margin-bottom: 20px;">
            <option value="Student">Student (Take Tests)</option>
            <option value="Instructor">Teacher (Create Tests)</option>
            <option value="Admin">Administrator (Manage System)</option>
        </select>
        
        <button type="submit" class="btn" style="width: 100%;">Complete Registration</button>
    </form>
</div>
{% endblock %}
