{% extends 'base.html' %}
{% block content %}
<section>
    <h2>Test: {{ info[0] }}</h2>
    <p><b>Subject:</b> {{ info[2] or 'General' }} | <b>Duration:</b> {{ info[1] }} mins</p>
    
    <hr>

    <form method="POST">
        {% for q in qs %}
        <div style="border-bottom: 1px dashed #ccc; padding: 15px 0;">
            <p><b>Q{{ loop.index }}: {{ q[1] }}</b></p>
            <label><input type="radio" name="q_{{ q[0] }}" value="A" required> A. {{ q[2] }}</label><br>
            <label><input type="radio" name="q_{{ q[0] }}" value="B" required> B. {{ q[3] }}</label><br>
            <label><input type="radio" name="q_{{ q[0] }}" value="C" required> C. {{ q[4] }}</label><br>
            <label><input type="radio" name="q_{{ q[0] }}" value="D" required> D. {{ q[5] }}</label>
        </div>
        {% else %}
        <p>No questions in this test.</p>
        {% endfor %}

        {% if qs %}
        <br>
        <button type="submit" onclick="return confirm('Submit test?')">Submit Assessment</button>
        {% endif %}
    </form>
</section>
{% endblock %}
